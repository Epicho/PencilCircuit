<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PencilCircuit - Interactive Blueprints</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/dreampulse/computer-modern-web-font@master/fonts.css">
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Gloria+Hallelujah&display=swap" rel="stylesheet">
    
    <style>
        /* --- GLOBAL UI --- */
        body {
            font-family: 'Architects Daughter', cursive;
            background-color: #fdfbf7;
            color: #2d2d2d;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            background-image: linear-gradient(#e8e6e1 1px, transparent 1px), linear-gradient(90deg, #e8e6e1 1px, transparent 1px);
            background-size: 20px 20px;
            min-height: 100vh;
            margin: 0;
            box-sizing: border-box;
        }

        *, *:before, *:after {
            box-sizing: inherit;
        }

        h1 { 
            font-family: 'Gloria Hallelujah', cursive;
            font-size: 56px; 
            margin-bottom: 5px;
            color: #2d2d2d;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.15); 
            text-align: center;
        }

        /* --- CATEGORY HEADERS --- */
        .category-title {
            font-size: 28px;
            margin-top: 30px;
            margin-bottom: 10px;
            width: 100%;
            text-align: left;
            border-bottom: 2px dashed #2d2d2d;
            padding-bottom: 5px;
            padding-left: 10px;
        }

        /* --- VIEW CONTAINERS --- */
        #gallery-view { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 900px; }
        #editor-view { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 900px; } 

        /* --- THE GALLERY GRID --- */
        .blueprint-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 30px;
            width: 100%;
            padding: 20px 0;
        }

        .blueprint-card {
            background: #ffffff;
            border: 2px solid #2d2d2d;
            border-radius: 15px 5px 12px 4px / 4px 12px 5px 15px; 
            padding: 25px 15px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.1);
            transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
        }

        .blueprint-card:hover {
            transform: rotate(-2deg) scale(1.05);
            background-color: #fff9c4; 
            box-shadow: 6px 6px 0px rgba(0,0,0,0.15);
        }

        .blueprint-card span.title { margin-top: 15px; font-size: 22px; font-weight: bold; text-align: center; }
        
        /* DYNAMIC THUMBNAIL SIZING */
        .thumbnail { width: 100%; max-width: 220px; height: auto; min-height: 90px; }

        /* SPECIAL SCALING FOR MASSIVE ACTIVE FILTER SVGS */
        #gallery-view .active-thumbnail .wire { stroke-width: 10px; }
        #gallery-view .active-thumbnail .label { font-size: 60px; }

        /* --- EDITOR CONTROLS --- */
        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 20px;
        }

        .btn {
            font-family: 'Architects Daughter', cursive;
            padding: 8px 20px;
            font-size: 18px;
            cursor: pointer;
            background-color: #2d2d2d;
            color: #ffffff;
            border: none;
            border-radius: 15px 225px 15px 255px / 255px 15px 225px 15px;
            transition: transform 0.1s;
            white-space: nowrap;
        }
        .btn:hover { transform: scale(1.05) rotate(-2deg); }
        .btn-outline { background-color: transparent; color: #2d2d2d; border: 2px solid #2d2d2d; }
        .btn-outline:hover { background-color: #2d2d2d; color: #ffffff; }

        .controls-bar {
            background: #ffffff;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column; 
            gap: 15px;
            border: 2px solid #2d2d2d;
            border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.1);
            width: 100%;
        }

        .input-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            width: 100%;
        }

        .control-item { display: flex; align-items: center; gap: 10px; font-weight: bold; }

        .input-group {
            display: flex;
            border: 2px solid #2d2d2d;
            border-radius: 10px 20px 10px 20px / 20px 10px 20px 10px;
            overflow: hidden;
            background: #fff;
        }

        input, select {
            font-family: 'Architects Daughter', cursive;
            font-size: 18px;
            padding: 6px 10px;
            border: none; outline: none;
            color: #2d2d2d; background: transparent;
        }
        input { width: 60px; text-align: center; }
        select { border-left: 2px solid #2d2d2d; cursor: pointer; background-color: #f4f4f4; }

        /* --- CANVAS CONTAINER --- */
        #schematic-container {
            background-color: #ffffff;
            padding: 30px;
            border: 2px solid #2d2d2d;
            border-radius: 2px 255px 3px 25px / 255px 5px 225px 3px;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            overflow: hidden; 
        }

        #dynamic-svg {
            width: 100%;
            height: auto;
            max-height: 50vh; /* Keeps it from getting too tall on mobile */
        }

        /* --- TOGGLE UI --- */
        .toggle-container {
            display: flex; align-items: center; gap: 8px;
            margin-top: 20px; font-size: 14px; font-weight: bold;
        }
        .switch { position: relative; display: inline-block; width: 36px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #2d2d2d; transition: .4s; border-radius: 18px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #007bff; }
        input:checked + .slider:before { transform: translateX(18px); } 

        /* --- SVG STYLING --- */
        .wire { 
            stroke: #2d2d2d; stroke-width: 2.5px;
            stroke-linecap: round; stroke-linejoin: round; fill: none; 
            transition: stroke 0.3s, stroke-width 0.3s;
        }
        .label {
            font-family: 'Architects Daughter', cursive;
            font-size: 20px; fill: #2d2d2d;
            text-anchor: middle; dominant-baseline: middle; 
            transition: font-family 0.3s, fill 0.3s;
        }
        .node { fill: #2d2d2d; } 

        /* PRO MODE OVERRIDES */
        #dynamic-svg.pro-mode .wire { stroke: #000000; stroke-width: 2px; stroke-linecap: butt; stroke-linejoin: miter; }
        #dynamic-svg.pro-mode .label { font-family: "Computer Modern Serif", serif; fill: #000000; }
        #dynamic-svg.pro-mode .node { fill: #000000; }

        /* ========================================== */
        /* MOBILE RESPONSIVE DESIGN (MEDIA QUERIES)   */
        /* ========================================== */
        @media (max-width: 768px) {
            body { padding: 20px 10px; }
            
            h1 { font-size: 42px; line-height: 1.1; margin-bottom: 20px; }
            
            .category-title { font-size: 24px; text-align: center; border-bottom: none; padding: 0; margin-top: 10px;}
            
            .blueprint-grid { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; padding: 10px 0; }
            .blueprint-card { padding: 15px 10px; }
            .blueprint-card span.title { font-size: 18px; margin-top: 10px; }
            
            /* Stack header controls vertically on small screens */
            .header-controls { flex-direction: column; gap: 15px; }
            h2#editor-title { font-size: 24px; text-align: center; margin: 0; padding: 0; border: none; order: -1; } /* Puts title at top */
            
            .controls-bar { padding: 15px; border-radius: 15px; }
            
            /* Stack inputs nicely */
            .input-row { flex-direction: column; align-items: center; gap: 15px; }
            .control-item { width: 100%; max-width: 280px; justify-content: space-between; }
            
            #schematic-container { padding: 10px; border-radius: 15px; }
            
            input { width: 50px; font-size: 16px; }
            select { font-size: 16px; }
            .btn { font-size: 16px; padding: 8px 16px; }
        }
    </style>
</head>
<body>

        <div class="header-controls">
            <button class="btn btn-outline" onclick="closeEditor()">⬅ Back to Gallery</button>
            <h2 id="editor-title" style="margin:0; border:none;">Template Name</h2>
            <button class="btn" onclick="copyToClipboard()">Export Image</button>
        </div>

        <div class="controls-bar" id="dynamic-controls"></div>

        <div id="schematic-container">
            <svg id="dynamic-svg" xmlns="http://www.w3.org/2000/svg">
                </svg>
        </div>

        <div class="toggle-container">
            <span>Image: Sketch</span>
            <label class="switch">
                <input type="checkbox" id="mode-toggle">
                <span class="slider"></span>
            </label>
            <span>Pro</span>
        </div>

    </div>

                    <text id="label-c1" class="label" x="67.5" y="160"></text>
                    <path class="wire" d="M 75,200 L 150,200" />
                    <circle cx="150" cy="200" r="3" class="node" />
                    <path class="wire" d="M 150,200 L 180,200" />
                    <path class="wire" d="M 180,180 L 180,220 M 195,180 L 195,220" />
                    <text id="label-c2" class="label" x="187.5" y="160"></text>
                    <path class="wire" d="M 195,200 L 260,200 L 320,200" />
                    <circle cx="260" cy="200" r="3" class="node" />
                    <path class="wire" d="M 320,130 L 320,230 L 420,180 Z" />
                    <path class="wire" style="stroke-width: 1.5px;" d="M 325,160 L 335,160 M 325,200 L 335,200 M 330,195 L 330,205" />
                    <path class="wire" d="M 260,200 L 260,230 L 245,240 L 275,260 L 245,280 L 275,300 L 260,310 L 260,330" />
                    <text id="label-r2" class="label" x="290" y="270" style="text-anchor: start;"></text>
                    <path class="wire" d="M 240,330 L 280,330 M 248,338 L 272,338 M 256,346 L 264,346" />
                    <path class="wire" d="M 150,200 L 150,80 L 200,80 L 210,60 L 230,100 L 250,60 L 270,100 L 280,80 L 450,80 L 450,180" />
                    <text id="label-r1" class="label" x="240" y="40"></text>
                    <path class="wire" d="M 320,160 L 290,160 L 290,120 L 450,120 L 450,180" />
                    <path class="wire" d="M 420,180 L 480,180" />
                    <circle cx="450" cy="180" r="3" class="node" />
                    <circle cx="480" cy="180" r="3" class="node" />
                    <text class="label" x="490" y="180" style="text-anchor: start;">Vout</text>
                    <text id="label-vi" class="label" x="-10" y="200" style="text-anchor: end;"></text>
                `
            }
        };

        let currentActiveTemplate = null;

        function openEditor(templateId) {
            currentActiveTemplate = templates[templateId];
            
            document.getElementById('gallery-view').style.display = 'none';
            document.getElementById('editor-view').style.display = 'flex';
            document.getElementById('editor-title').innerText = currentActiveTemplate.name;
            
            const dynamicSvg = document.getElementById('dynamic-svg');
            dynamicSvg.setAttribute('width', currentActiveTemplate.width);
            dynamicSvg.setAttribute('height', currentActiveTemplate.height);
            dynamicSvg.setAttribute('viewBox', currentActiveTemplate.viewBox);
            dynamicSvg.innerHTML = currentActiveTemplate.svg;

            const controlsContainer = document.getElementById('dynamic-controls');
            controlsContainer.innerHTML = ''; 

            let topRow = document.createElement('div');
            topRow.className = 'input-row';
            let bottomRow = document.createElement('div');
            bottomRow.className = 'input-row';

            const totalInputs = currentActiveTemplate.inputs.length;
            let splitIndex = 3; 
            if (totalInputs === 4) {
                splitIndex = 2; 
            }

            currentActiveTemplate.inputs.forEach((inputData, index) => {
                let optionsHTML = inputData.units.map(unit => `<option value="${unit}">${unit}</option>`).join('');
                const html = `
                    <div class="control-item">
                        <label>${inputData.label}:</label>
                        <div class="input-group">
                            <input type="text" id="input-${inputData.id}" value="${inputData.default}">
                            <select id="unit-${inputData.id}">${optionsHTML}</select>
                        </div>
                    </div>
                `;
                
                if (index < splitIndex) {
                    topRow.insertAdjacentHTML('beforeend', html);
                } else {
                    bottomRow.insertAdjacentHTML('beforeend', html);
                }
            });
            
            controlsContainer.appendChild(topRow);
            if (totalInputs > splitIndex) {
                controlsContainer.appendChild(bottomRow);
            }

            currentActiveTemplate.inputs.forEach(inputData => {
                document.getElementById(`input-${inputData.id}`).addEventListener('input', () => updateLabel(inputData.id));
                document.getElementById(`unit-${inputData.id}`).addEventListener('change', () => updateLabel(inputData.id));
                updateLabel(inputData.id);
            });
        }

        function closeEditor() {
            document.getElementById('editor-view').style.display = 'none';
            document.getElementById('gallery-view').style.display = 'flex';
        }

        function updateLabel(id) {
            const val = document.getElementById(`input-${id}`).value;
            const unit = document.getElementById(`unit-${id}`).value;
            const targetSvgText = document.getElementById(`label-${id}`);
            if(targetSvgText) {
                targetSvgText.innerHTML = val + unit;
            }
        }

        const modeToggle = document.getElementById('mode-toggle');
        const dynamicSvg = document.getElementById('dynamic-svg');
        modeToggle.addEventListener('change', function() {
            if (this.checked) dynamicSvg.classList.add('pro-mode');
            else dynamicSvg.classList.remove('pro-mode');
        });

        async function copyToClipboard() {
            const button = document.querySelector('.header-controls .btn:not(.btn-outline)'); 
            const isProMode = modeToggle.checked; 
            const clone = dynamicSvg.cloneNode(true);
            
            const wires = clone.querySelectorAll('.wire');
            wires.forEach(el => {
                el.style.fill = 'none';
                el.style.stroke = isProMode ? '#000000' : '#2d2d2d';
                el.style.strokeWidth = isProMode ? '2px' : '2.5px';
                el.style.strokeLinecap = isProMode ? 'butt' : 'round';
                el.style.strokeLinejoin = isProMode ? 'miter' : 'round';
            });

            const labels = clone.querySelectorAll('.label');
            labels.forEach(el => {
                el.style.fontFamily = isProMode ? '"Computer Modern Serif", serif' : "'Architects Daughter', cursive";
                el.style.fontSize = '20px';
                el.style.fill = isProMode ? '#000000' : '#2d2d2d';
                el.style.dominantBaseline = 'middle';

                if (el.getAttribute('style') && el.getAttribute('style').includes('text-anchor: end')) {
                    el.style.textAnchor = 'end';
                } else if (el.getAttribute('style') && el.getAttribute('style').includes('text-anchor: start')) {
                    el.style.textAnchor = 'start';
                } else {
                    el.style.textAnchor = 'middle';
                }

                if (el.innerHTML === '+' || el.innerHTML === '-') {
                    el.style.fontSize = '16px';
                }
            });
            
            const nodes = clone.querySelectorAll('.node');
            nodes.forEach(el => {
                el.style.fill = isProMode ? '#000000' : '#2d2d2d';
            });

            const svgString = new XMLSerializer().serializeToString(clone);
            const margin = 10;
            const svgWidth = currentActiveTemplate.width; 
            const svgHeight = currentActiveTemplate.height; 
            
            const canvasWidth = svgWidth + 2 * margin;
            const canvasHeight = svgHeight + 2 * margin;

            const canvas = document.createElement('canvas');
            canvas.width = canvasWidth; canvas.height = canvasHeight;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const img = new Image();
            const svgBlob = new Blob([svgString], {type: "image/svg+xml;charset=utf-8"});
            const url = URL.createObjectURL(svgBlob);
            
            img.onload = async function() {
                ctx.drawImage(img, margin, margin, svgWidth, svgHeight);
                URL.revokeObjectURL(url);
                canvas.toBlob(async (blob) => {
                    try {
                        await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
                        const origText = button.innerText; button.innerText = "Copied!";
                        setTimeout(() => button.innerText = origText, 2000);
                    } catch (err) {
                        alert("Failed to copy image.");
                    }
                }, 'image/png');
            };
            img.src = url;
        }
    </script>
</body>
